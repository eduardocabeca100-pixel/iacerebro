/* PATCH CÉREBRO IA — Orçamento editável e exportação */
.budget-table-wrap{
  width:100%;
  overflow:auto;
  border:1px solid var(--line);
  border-radius:22px;
  background:#fff;
}

.budget-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  min-width:920px;
}

.budget-table th{
  background:#f8fafc;
  color:#475467;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.08em;
  text-align:left;
  padding:11px 10px;
  border-bottom:1px solid var(--line);
}

.budget-table td{
  padding:8px 10px;
  border-bottom:1px solid #eef1f6;
  vertical-align:middle;
}

.budget-table tr:last-child td{
  border-bottom:0;
}

.budget-table input,
.budget-table select{
  width:100%;
  border:1px solid #d8deeb;
  border-radius:14px;
  padding:9px 10px;
  background:#fff;
  outline:none;
  font-size:12px;
}

.budget-table input:focus,
.budget-table select:focus{
  border-color:#a78bfa;
  box-shadow:0 0 0 3px rgba(135,56,245,.12);
}

.budget-total-box{
  background:linear-gradient(135deg,#f8f5ff,#fff1f8);
  border:1px solid #eadcff;
  border-radius:22px;
  padding:16px;
}

.budget-grand{
  font-size:26px;
  font-weight:950;
  color:#6d28d9;
}

.export-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}

.export-card{
  border:1px solid var(--line);
  border-radius:20px;
  padding:15px;
  background:#fff;
}

@media(max-width:800px){
  .export-grid{grid-template-columns:1fr}
}
/* FIM PATCH CÉREBRO IA — Orçamento editável e exportação */


/* PATCH CÉREBRO IA — Layout completo baseado no vídeo */
.video-flow-hero{
  background:linear-gradient(120deg,#6d28d9,#db2777);
  color:white;
  border-radius:26px;
  padding:22px;
  box-shadow:0 20px 60px rgba(109,40,217,.20);
}
.video-flow-hero .muted{color:rgba(255,255,255,.78)}
.flow-card{
  background:white;
  border:1px solid var(--line);
  border-radius:24px;
  padding:16px;
  box-shadow:var(--shadow);
}
.flow-tabs{
  display:flex;
  gap:8px;
  overflow:auto;
  padding:8px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:999px;
  box-shadow:var(--shadow);
}
.flow-tabs button{
  border:0;
  background:#f8fafc;
  border-radius:999px;
  padding:10px 15px;
  font-weight:900;
  white-space:nowrap;
  color:#475467;
}
.flow-tabs button.active{
  background:linear-gradient(90deg,var(--primary),var(--primary2));
  color:#fff;
}
.score-grid{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:12px;
}
.score-card{
  border:1px solid var(--line);
  background:#fff;
  border-radius:20px;
  padding:14px;
}
.score-card b{font-size:24px}
.score-card.red{background:#fff1f2}
.score-card.green{background:#ecfdf3}
.score-card.purple{background:#f5f3ff}
.score-card.blue{background:#eff6ff}
.score-card.amber{background:#fffbeb}
.required-box{
  background:#fff1f2;
  border:1px solid #fecdd3;
  border-radius:15px;
  padding:11px;
  margin-bottom:8px;
}
.yellow-note{
  background:#fffbeb;
  border:1px solid #fde68a;
  border-radius:18px;
  padding:14px;
  color:#78350f;
}
.title-suggest{
  background:#fff;
  border:1px solid var(--line);
  border-radius:22px;
  padding:16px;
  box-shadow:var(--shadow);
}
.section-chip-row{
  display:flex;
  gap:8px;
  overflow:auto;
  align-items:center;
}
.section-chip-row button{
  border:1px solid var(--line);
  background:#fff;
  border-radius:999px;
  padding:9px 13px;
  font-weight:900;
  white-space:nowrap;
}
.section-chip-row button.active{
  background:linear-gradient(90deg,var(--primary),var(--primary2));
  color:#fff;
  border:0;
}
.portfolio-style{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.style-pill{
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px;
  background:#fff;
  display:flex;
  gap:8px;
  align-items:center;
}
.dotcolor{
  width:14px;
  height:14px;
  border-radius:50%;
}
.pf-tabs{
  display:flex;
  gap:8px;
  overflow:auto;
  border-bottom:1px solid var(--line);
  padding:0 0 10px;
  margin-bottom:14px;
}
.pf-tabs button{
  border:0;
  background:#f8fafc;
  border-radius:999px;
  padding:8px 12px;
  font-weight:900;
  color:#475467;
  white-space:nowrap;
}
.pf-tabs button.active{
  background:#111827;
  color:#fff;
}
.doc-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.doc-card{
  border:1.5px dashed #cbd5e1;
  border-radius:20px;
  background:#fff;
  padding:16px;
}
.doc-card input{
  margin-top:10px;
  max-width:100%;
}
.wizard-step-card{
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin:10px 0;
  background:#fff;
}
.wizard-step-card b{display:block}
.top-context{
  font-size:12px;
  color:#667085;
  margin-bottom:10px;
}
@media(max-width:900px){
  .score-grid,.portfolio-style,.doc-grid{grid-template-columns:1fr}
  .flow-tabs{border-radius:22px}
}
/* FIM PATCH CÉREBRO IA — Layout completo baseado no vídeo */

<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">C</div><div><b>CÉREBRO IA</b><span>Projetos culturais aprováveis</span></div></div>
    <div class="navtitle">Navegação</div>
    <div class="nav" id="nav"></div>
    <div class="profile"><div class="row"><div class="logo" style="width:32px;height:32px">E</div><div><b>Eduardo</b><span class="small muted" style="display:block">admin@cerebroia.app</span></div></div><button class="btn sm" data-action="logout" style="width:100%;margin-top:10px">↪ Sair</button></div>
  </aside>
  <main class="main"><div class="top"><div><h1 id="title">Painel</h1><p id="subtitle">Sistema operacional de projetos culturais</p></div><div class="row"><button class="btn" data-action="saveAll">Salvar</button><button class="btn primary" data-page="new">+ Novo Projeto</button></div></div><section class="content" id="app"></section></main>
</div>
<div class="modalwrap" id="modalwrap"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<script>
const STORAGE='cerebroIA_v4_terminal';
const today=()=>new Date().toLocaleDateString('pt-BR');
const uid=p=>p+Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-3);
const money=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

function ensureBudget(){
  const p = project();

  if(!p.budgetRows || !Array.isArray(p.budgetRows)){
    p.budgetRows = [
      {category:'Equipe', item:'Coordenação geral', qty:1, unit:1800, notes:'Gestão geral, organização do projeto e acompanhamento da execução.'},
      {category:'Equipe', item:'Elenco / artistas', qty:3, unit:1000, notes:'Cachês artísticos para apresentações, ensaios e execução.'},
      {category:'Produção', item:'Produção executiva', qty:1, unit:1500, notes:'Planejamento, logística, contatos, cronograma e organização.'},
      {category:'Comunicação', item:'Divulgação digital e materiais', qty:1, unit:900, notes:'Cards, textos, impulsionamento básico e articulação de público.'},
      {category:'Material', item:'Figurino, cenário e insumos', qty:1, unit:800, notes:'Materiais necessários para composição cênica.'},
      {category:'Técnica', item:'Som, luz e operação técnica', qty:1, unit:1000, notes:'Apoio técnico para realização das apresentações.'},
      {category:'Administração', item:'Prestação de contas', qty:1, unit:700, notes:'Organização documental e apoio à prestação de contas.'},
      {category:'Acessibilidade', item:'Ações de acessibilidade', qty:1, unit:300, notes:'Medidas compatíveis com o edital e orçamento disponível.'}
    ];
  }

  return p.budgetRows;
}

function budgetSum(rows){
  return rows.reduce((total,row)=>total + (Number(row.qty || 0) * Number(row.unit || 0)), 0);
}

function readBudgetFromScreen(){
  const p = project();
  const rows = [];

  document.querySelectorAll('[data-budget-row]').forEach(tr=>{
    const i = tr.dataset.budgetRow;

    rows.push({
      category: document.querySelector(`[data-budget="category"][data-i="${i}"]`)?.value || 'Geral',
      item: document.querySelector(`[data-budget="item"][data-i="${i}"]`)?.value || 'Item sem descrição',
      qty: Number(document.querySelector(`[data-budget="qty"][data-i="${i}"]`)?.value || 0),
      unit: Number(document.querySelector(`[data-budget="unit"][data-i="${i}"]`)?.value || 0),
      notes: document.querySelector(`[data-budget="notes"][data-i="${i}"]`)?.value || ''
    });
  });

  p.budgetRows = rows;
  p.updated = 'Agora';
  save();

  return rows;
}

function recalcBudgetVisual(){
  let total = 0;

  document.querySelectorAll('[data-budget-row]').forEach(tr=>{
    const i = tr.dataset.budgetRow;
    const qty = Number(document.querySelector(`[data-budget="qty"][data-i="${i}"]`)?.value || 0);
    const unit = Number(document.querySelector(`[data-budget="unit"][data-i="${i}"]`)?.value || 0);
    const rowTotal = qty * unit;

    total += rowTotal;

    const cell = document.querySelector(`[data-budget-total="${i}"]`);

    if(cell) cell.textContent = money(rowTotal);
  });

  const grand = document.getElementById('budgetGrandTotal');
  const diff = document.getElementById('budgetDiff');
  const p = project();

  if(grand) grand.textContent = money(total);

  if(diff){
    const delta = Number(p.budget || 0) - total;

    diff.textContent = delta === 0
      ? 'Planilha fechada exatamente no valor do projeto.'
      : delta > 0
        ? `Ainda falta distribuir ${money(delta)}.`
        : `A planilha ultrapassou ${money(Math.abs(delta))}.`;
    diff.className = 'pill ' + (delta === 0 ? 'green' : delta > 0 ? 'amber' : 'red');
  }
}

function saveBudget(){
  const rows = readBudgetFromScreen();
  const p = project();
  const total = budgetSum(rows);

  p.progress = Math.min(100, Number(p.progress || 70) + 2);

  if(total === Number(p.budget || 0)){
    p.score = Math.min(100, Number(p.score || 80) + 2);
  }

  save();
  toast('Planilha orçamentária salva.');
  render();
}

function addBudgetRow(){
  readBudgetFromScreen();

  const p = project();

  p.budgetRows.push({
    category:'Geral',
    item:'Novo item orçamentário',
    qty:1,
    unit:0,
    notes:'Descreva a justificativa desta despesa.'
  });

  save();
  render();
  toast('Item adicionado à planilha.');
}

function removeBudgetRow(index){
  readBudgetFromScreen();

  const p = project();

  p.budgetRows.splice(Number(index), 1);

  save();
  render();
  toast('Item removido da planilha.');
}

function rebalanceBudgetCommercial(){
  const p = project();
  let rows = readBudgetFromScreen();

  if(!rows.length){
    rows = ensureBudget();
  }

  const current = budgetSum(rows);
  const target = Number(p.budget || 0);

  if(!target){
    toast('Informe o valor total do projeto antes de reequilibrar.');
    return;
  }

  if(!current){
    const each = target / rows.length;
    rows = rows.map(r=>({...r, qty:Number(r.qty || 1), unit:Math.round(each / Number(r.qty || 1))}));
  }else{
    const factor = target / current;
    rows = rows.map(r=>({
      ...r,
      unit: Math.max(0, Math.round(Number(r.unit || 0) * factor))
    }));

    const diff = target - budgetSum(rows);

    if(rows[0]){
      rows[0].unit = Number(rows[0].unit || 0) + diff;
    }
  }

  p.budgetRows = rows;
  p.updated = 'Agora';

  save();
  render();
  toast('Planilha reequilibrada automaticamente dentro do valor do projeto.');
}

function downloadWord(filename, htmlBody){
  const html = exportShell(filename, htmlBody);
  const blob = new Blob([html], {type:'application/msword;charset=utf-8'});
  const a = document.createElement('a');

  a.href = URL.createObjectURL(blob);
  a.download = filename.endsWith('.doc') ? filename : filename + '.doc';
  a.click();

  URL.revokeObjectURL(a.href);
}

function openPdfPrint(title, htmlBody){
  const html = exportShell(title, htmlBody);
  const w = window.open('', '_blank');

  if(!w){
    toast('O navegador bloqueou a janela de PDF. Permita pop-ups para exportar.');
    return;
  }

  w.document.open();
  w.document.write(html);
  w.document.close();

  setTimeout(()=>{
    w.focus();
    w.print();
  }, 300);
}

/* PATCH CÉREBRO IA — Conexão backend IA e oportunidades */
async function cerebroPost(url, payload){
  const response = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });

  const data = await response.json();

  if(!response.ok){
    throw new Error(data.error || 'Erro na API');
  }

  return data;
}

async function cerebroGet(url){
  const response = await fetch(url);
  const data = await response.json();

  if(!response.ok){
    throw new Error(data.error || 'Erro na API');
  }

  return data;
}

document.addEventListener('click', async function(e){
  const b = e.target.closest('button');
  if(!b) return;

  const a = b.dataset.action;

  if(!['improveBlock','applyAllFixes','askIA','internetOpps'].includes(a)) return;

  e.preventDefault();
  e.stopPropagation();
  e.stopImmediatePropagation();

  try{
    if(a === 'improveBlock'){
      const p = project();
      const editor = document.getElementById('editor');
      const currentText = editor ? editor.value : (p.blocks?.[state.blockKey] || '');

      toast('IA revisando este bloco...');

      const data = await cerebroPost('/api/ia', {
        task: 'improveBlock',
        project: p,
        blockName: state.blockKey,
        text: currentText
      });

      p.blocks[state.blockKey] = data.output || currentText;
      p.score = Math.min(100, Number(p.score || 80) + 3);
      p.updated = 'Agora';

      save();
      render();
      toast(data.demo ? 'Bloco melhorado em modo demo.' : 'Bloco melhorado com IA.');
      return;
    }

    if(a === 'applyAllFixes'){
      const p = project();

      toast('IA aplicando melhorias no projeto...');

      const data = await cerebroPost('/api/ia', {
        task: 'applyAllFixes',
        project: p,
        blocks: p.blocks || {}
      });

      let parsed = null;

      try{
        parsed = JSON.parse(data.output);
      }catch{}

      if(parsed && parsed.blocks){
        p.blocks = parsed.blocks;
        p.score = Math.min(100, Number(parsed.scoreSuggestion || p.score || 90));
      }else{
        Object.keys(p.blocks || {}).forEach(k=>{
          p.blocks[k] = `${p.blocks[k]}

Aprimoramento IA aplicado: texto revisado para maior clareza, impacto cultural, viabilidade técnica e aderência ao edital.`;
        });
        p.score = Math.min(100, Number(p.score || 80) + 10);
      }

      p.progress = Math.min(100, Number(p.progress || 70) + 10);
      p.updated = 'Agora';
      state.workspaceTab = 'text';

      save();
      render();
      toast(data.demo ? 'Melhorias aplicadas em modo demo.' : 'Melhorias aplicadas com IA.');
      return;
    }

    if(a === 'askIA'){
      const p = project();
      const question = document.getElementById('chatMsg')?.value || '';

      if(!question.trim()){
        toast('Digite uma pergunta para a IA.');
        return;
      }

      toast('Consultando IA do projeto...');

      const data = await cerebroPost('/api/ia', {
        task: 'chat',
        project: p,
        question
      });

      const out = document.getElementById('chatOut');

      if(out){
        out.innerHTML = `<div class="notice" style="padding:14px;margin-top:12px"><b>IA:</b> ${String(data.output || '').replace(/\n/g,'<br>')}</div>`;
      }

      toast(data.demo ? 'Resposta demo gerada.' : 'Resposta da IA gerada.');
      return;
    }

    if(a === 'internetOpps'){
      const uf = document.getElementById('fUf')?.value || 'SC';
      const linguagem = document.getElementById('fLang')?.value || 'Teatro';
      const q = document.getElementById('fQ')?.value || '';

      toast('Buscando editais na internet...');

      const data = await cerebroGet(`/api/oportunidades?uf=${encodeURIComponent(uf)}&linguagem=${encodeURIComponent(linguagem)}&q=${encodeURIComponent(q)}`);

      if(Array.isArray(data)){
        state.opportunities = data;
        state.opFilter = {uf, lang:linguagem, source:'Todas', q};
        save();
        render();
        toast('Oportunidades atualizadas.');
      }else{
        toast('A busca retornou formato inesperado.');
      }

      return;
    }
  }catch(err){
    console.error(err);
    toast('Erro: ' + err.message);
  }
}, true);
/* FIM PATCH CÉREBRO IA — Conexão backend IA e oportunidades */

function ensureRealProjectData(){
  const p = project();

  p.details = p.details || {};

  const defaults = {
    format:'Apresentação teatral com mediação cultural',
    presentations:'1 apresentação gratuita',
    locations:'Jaraguá do Sul/SC — local a definir conforme parceria cultural',
    targetAudience:'Estudantes, famílias, comunidade local, educadores, artistas e público em geral',
    duration:'Execução prevista conforme cronograma do edital',
    classification:'Livre ou conforme definição final do espetáculo',
    accessibility:'Comunicação clara, acolhimento do público, organização do espaço e medidas acessíveis conforme edital',
    counterpart:'Apresentação gratuita e/ou ação de mediação cultural aberta à comunidade',
    communication:'Divulgação em redes sociais, parceiros locais, escolas, espaços culturais e grupos comunitários',
    expectedResults:'Ampliação do acesso às artes cênicas, formação de público, fortalecimento da produção local e geração de registros culturais',
    startDate:'',
    endDate:'',
    observation:'Revisar dados finais antes de copiar para o formulário oficial do edital.'
  };

  Object.keys(defaults).forEach(k=>{
    if(!p.details[k]) p.details[k] = defaults[k];
  });

  p.blocks = p.blocks || {};

  Object.keys(realProjectBlocks).forEach(k=>{
    if(!p.blocks[k]) p.blocks[k] = realProjectBlocks[k];
  });

  p.sectionFiles = p.sectionFiles || {};

  Object.keys(realProjectBlocks).forEach(k=>{
    if(!Array.isArray(p.sectionFiles[k])) p.sectionFiles[k] = [];
  });

  if(!p.blocks[state.blockKey]){
    state.blockKey = 'Resumo';
  }

  save();

  return p;
}

  btn.className = 'sidebar-toggle';
  btn.type = 'button';
  btn.innerHTML = '☰';
  btn.title = 'Diminuir/expandir menu';

  btn.addEventListener('click',()=>{
    document.querySelector('.app')?.classList.toggle('sidebar-mini');
    localStorage.setItem('cerebro_sidebar_mini', document.querySelector('.app')?.classList.contains('sidebar-mini') ? '1' : '0');
  });

  brand.appendChild(btn);

function saveProjectData(){
  const p = project();

  p.title = val('pdTitle') || p.title;
  p.proponent = val('pdProponent') || p.proponent;
  p.budget = Number(val('pdBudget') || p.budget || 0);
  p.language = val('pdLanguage') || p.language;
  p.city = val('pdCity') || p.city;
  p.uf = val('pdUf') || p.uf;

  p.details = {
    ...(p.details || {}),
    format: val('pdFormat'),
    presentations: val('pdPresentations'),
    locations: val('pdLocations'),
    classification: val('pdClassification'),
    startDate: val('pdStart'),
    endDate: val('pdEnd'),
    targetAudience: val('pdTarget'),
    accessibility: val('pdAccessibility'),
    counterpart: val('pdCounterpart'),
    communication: val('pdCommunication'),
    expectedResults: val('pdResults'),
    observation: val('pdObs')
  };

  p.updated = 'Agora';

  save();
  closeModal();
  render();
  toast('Dados do projeto salvos.');
}

function syncBlockFromProjectData(){
  const p = ensureRealProjectData();
  const d = p.details || {};

  p.blocks['Objeto da Proposta'] = `Realizar o projeto cultural “${p.title}”, no formato de ${d.format}, com ${d.presentations}, em ${d.locations}. A proposta será desenvolvida em ${p.city}/${p.uf}, com foco na democratização do acesso à cultura, na valorização da produção artística local e na formação de público. O projeto contempla planejamento, organização de equipe, execução das ações, comunicação, registros e prestação de contas, respeitando o valor total de ${money(p.budget)} e as exigências do edital.`;

  p.blocks['Público Alvo'] = d.targetAudience;

  p.blocks['Acessibilidade'] = d.accessibility;

  p.blocks['Contrapartida Social'] = d.counterpart;

  p.blocks['Plano de Comunicação'] = d.communication;

  p.blocks['Cronograma'] = `A execução do projeto será organizada conforme o período previsto entre ${d.startDate || 'data de início a definir'} e ${d.endDate || 'data de término a definir'}, contemplando pré-produção, produção, execução das apresentações e pós-produção. Na pré-produção serão realizados planejamento, reuniões, organização documental e alinhamentos técnicos. Na produção ocorrerão ensaios, comunicação e preparação de materiais. Na execução serão realizadas as ações culturais previstas. Na pós-produção serão organizados registros, relatórios, comprovantes e materiais de prestação de contas.`;

  p.updated = 'Agora';

  save();
  render();
  toast('Blocos atualizados com os dados reais do projeto.');
}

          ${sectionFilesHtml(k)}

      </div>

document.addEventListener('change', e=>{
  const input = e.target.closest('[data-section-upload]');

  if(!input) return;

  const key = input.dataset.sectionUpload;
  const p = ensureRealProjectData();

  p.sectionFiles = p.sectionFiles || {};
  p.sectionFiles[key] = p.sectionFiles[key] || [];

  Array.from(input.files || []).forEach(file=>{
    if(!p.sectionFiles[key].includes(file.name)){
      p.sectionFiles[key].push(file.name);
    }
  });

  p.updated = 'Agora';

  save();
  render();
  toast('Arquivo vinculado à seção.');
}, true);

document.addEventListener('click', e=>{
  const b = e.target.closest('button');

  if(!b) return;

  const a = b.dataset.action;

  if(!['editProjectData','saveProjectData','syncBlockData','removeSectionFile'].includes(a)) return;

  e.preventDefault();
  e.stopPropagation();
  e.stopImmediatePropagation();

  if(a === 'editProjectData') return editProjectDataModal();

  if(a === 'saveProjectData') return saveProjectData();

  if(a === 'syncBlockData') return syncBlockFromProjectData();

  if(a === 'removeSectionFile'){
    const p = ensureRealProjectData();
    const key = b.dataset.block;
    const i = Number(b.dataset.i);

    if(p.sectionFiles?.[key]){
      p.sectionFiles[key].splice(i,1);
      save();
      render();
      toast('Arquivo removido da seção.');
    }

    return;
  }
}, true);
